<!DOCTYPE html>
<html>
<head>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <title>Viral Link Generator Pro</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:90%;
      max-width:500px;
      background:rgba(255,255,255,0.05);
      padding:20px;
      border-radius:15px;
      backdrop-filter:blur(10px);
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    button:hover{
      background:#2563eb;
    }

    .result{
      margin-top:15px;
      word-break:break-all;
    }

    a{color:#38bdf8;}
  </style>
</head>

<body>

<div class="box">

  <h2>🔗 Viral Link Generator Pro</h2>

  <input id="url" placeholder="Paste your long URL" />

  <button onclick="generate()">🚀 Generate Link</button>

  <div class="result" id="out"></div>

</div>

<script>

  // 🔥 FIREBASE CONFIG (CHANGE THIS)
  const firebaseConfig = {
    apiKey: "AIzaSyAXbgxsy5yHnZinjn4RsGxd6tWJsg8jdw8",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 🚀 GENERATE LINK
  function generate(){
    let url = document.getElementById("url").value;

    if(!url){
      alert("Enter URL");
      return;
    }

    db.collection("links").add({
      url: url,
      clicks: 0,
      created: Date.now()
    }).then((docRef) => {

      let id = docRef.id;
      let short = window.location.href.split("#")[0] + "#" + id;

      document.getElementById("out").innerHTML = `
        🔗 Short Link: <br><br>
        <a href="${short}" target="_blank">${short}</a>
      `;
    });
  }

  // 🔁 REDIRECT + CLICK TRACK
  window.onload = function(){
    let id = window.location.hash.replace("#","");

    if(id){
      let ref = db.collection("links").doc(id);

      ref.get().then((doc) => {
        if(doc.exists){
          let data = doc.data();

          ref.update({
            clicks: data.clicks + 1
          });

          window.location.href = data.url;
        }
      });
    }
  }

</script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAJxAwmhWbO_i3Yx_wumiOjg412paUgPxI",
    authDomain: "free-short-2827c.firebaseapp.com",
    projectId: "free-short-2827c",
    storageBucket: "free-short-2827c.appspot.com",
    messagingSenderId: "997627808794",
    appId: "1:997627808794:web:794aaa06b8bc43ac6855a3"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  console.log("🔥 Firebase Connected");
</script>
</body>
</html>
