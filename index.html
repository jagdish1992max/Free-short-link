<!DOCTYPE html>
<html>
<head>
  <title>Short Link Pro</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body{
      font-family:Arial;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .box{
      width:300px;
      padding:20px;
      background:#1e293b;
      border-radius:10px;
    }
    input,button{
      width:100%;
      padding:10px;
      margin-top:10px;
    }
    a{color:#38bdf8;}
  </style>
</head>

<body>

<div class="box">
  <h2>🔗 Short Link Generator</h2>

  <input id="url" placeholder="Enter URL">

  <button onclick="generate()">Generate</button>

  <div id="out"></div>
</div>

<script>
  // 🔥 Firebase Config (PUT YOUR VALUES HERE)
  const firebaseConfig = {
    apiKey: "AIzaSyAJxAwmhWbO_i3Yx_wumiOjg412paUgPxI",
    authDomain: "free-short-2827c.firebaseapp.com",
    projectId: "free-short-2827c",
    storageBucket: "free-short-2827c.appspot.com",
    messagingSenderId: "997627808794",
    appId: "1:997627808794:web:794aaa06b8bc43ac6855a3"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 🚀 Generate Link
  function generate(){
    let url = document.getElementById("url").value;

    if(!url){
      alert("Enter URL");
      return;
    }

    db.collection("links").add({
      url: url,
      clicks: 0,
      created: Date.now()
    }).then((doc) => {

      let id = doc.id;
      let short = window.location.href.split("#")[0] + "#" + id;

      document.getElementById("out").innerHTML =
        "🔗 <a href='" + short + "' target='_blank'>" + short + "</a>";

    });
  }

  // 🔁 Redirect + Click Counter
  window.onload = function(){
    let id = window.location.hash.replace("#","");

    if(id){
      let ref = db.collection("links").doc(id);

      ref.get().then((doc) => {
        if(doc.exists){
          let data = doc.data();

          ref.update({
            clicks: data.clicks + 1
          });

          window.location.href = data.url;
        } else {
          document.body.innerHTML = "<h2>Link not found ❌</h2>";
        }
      });
    }
  }
</script>

</body>
</html>
