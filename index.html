<!DOCTYPE html>
<html>
<head>
  <title>Short Link Pro</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

.container{
  max-width:600px;
  margin:100px auto;
  padding:20px;
}

.card{
  background:#1f2937;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

a{color:#38bdf8;}
  </style>
</head>

<body>

<div class="box">
  <h2>🔗 Short Link Generator</h2>

  <input id="url" placeholder="Enter URL">

  <button onclick="generate()">Generate</button>
function copyLink(text){
  navigator.clipboard.writeText(text);
  alert("Copied ✅");
}
  <div id="out"><button onclick="copyLink(short)">Copy Link</button></div>
</div>

<script>
  // 🔥 Firebase Config (PUT YOUR VALUES HERE)
  const firebaseConfig = {
    apiKey: "AIzaSyAJxAwmhWbO_i3Yx_wumiOjg412paUgPxI",
    authDomain: "free-short-2827c.firebaseapp.com",
    projectId: "free-short-2827c",
    storageBucket: "free-short-2827c.appspot.com",
    messagingSenderId: "997627808794",
    appId: "1:997627808794:web:794aaa06b8bc43ac6855a3"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 🚀 Generate Link
  function generate(){
    let url = document.getElementById("url").value;

    if(!url){
      alert("Enter URL");
      return;
    }

    db.collection("links").add({
      url: url,
      clicks: 0,
      created: Date.now()
    }).then((doc) => {

      let id = doc.id;
      let short = window.location.href.split("#")[0] + "#" + id;

      document.getElementById("out").innerHTML =
        "🔗 <a href='" + short + "' target='_blank'>" + short + "</a>";

    });
  }

  // 🔁 Redirect + Click Counter
  window.onload = function(){
    let id = window.location.hash.replace("#","");

    if(id){
      let ref = db.collection("links").doc(id);

      ref.get().then((doc) => {
        if(doc.exists){
          let data = doc.data();

          ref.update({
            clicks: data.clicks + 1
          });

          window.location.href = data.url;
        } else {
          document.body.innerHTML = "<h2>Link not found ❌</h2>";
        }
      });
    }
  }
</script>

</body>
</html>
