<!DOCTYPE html>
<html>
<head>

<title>PRO URL Shortener</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.box{
max-width:500px;
margin:auto;
background:#1e293b;
padding:25px;
border-radius:12px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

.card{
margin-top:15px;
padding:15px;
background:#334155;
border-radius:10px;
}

</style>

</head>

<body>
<button id="redirectBtn" style="display:none;padding:12px 20px;background:#22c55e;border:none;border-radius:8px;color:white;font-size:16px">
Continue to link
</button>
 
<div class="box">

<h2>🔗 PRO URL Shortener</h2>

<input id="url" placeholder="Paste long URL here">

<button onclick="generate()">Generate Link</button>

<div id="out" style="margin-top:15px"></div>

<h3 style="margin-top:25px">📊 Dashboard</h3>

<div id="history"></div>

</div>

<script>

 // 🔥 Firebase Config (PUT YOUR VALUES HERE)
const firebaseConfig = {
apiKey: "AIzaSyAJxAwmhWbO_i3Yx_wumiOjg412paUgPxI",
authDomain: "free-short-2827c.firebaseapp.com",
projectId: "free-short-2827c",
storageBucket: "free-short-2827c.appspot.com",
messagingSenderId: "997627808794",
appId: "1:997627808794:web:794aaa06b8bc43ac6855a3"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();



function generate(){

let url=document.getElementById("url").value;

if(url==""){
alert("Enter URL first");
return;
}

db.collection("links").add({
url:url,
clicks:0,
created:Date.now()
})

.then((doc)=>{

let short=window.location.href.split("#")[0]+"#"+doc.id;

document.getElementById("out").innerHTML=

`<div class="card">
<a href="${short}" target="_blank">${short}</a>
<br><br>
<button onclick="copyLink('${short}')">📋 Copy</button>
</div>`;

loadLinks();

});

}



function copyLink(link){

navigator.clipboard.writeText(link);

alert("Link copied ✅");

}



function deleteLink(id){

if(confirm("Delete this link?")){

db.collection("links").doc(id).delete()

.then(()=>{

loadLinks();

});

}

}



function loadLinks(){

db.collection("links")

.orderBy("created","desc")

.get()

.then((snapshot)=>{

let html="";

snapshot.forEach((doc)=>{

let data=doc.data();

let id=doc.id;

let short=window.location.href.split("#")[0]+"#"+id;

html+=`

<div class="card">

🔗 <a href="${short}" target="_blank">${short}</a>

<br><br>

📊 Clicks: ${data.clicks}

<br><br>

<button onclick="copyLink('${short}')">📋 Copy</button>

<button onclick="deleteLink('${id}')">🗑 Delete</button>

</div>

`;

});

document.getElementById("history").innerHTML=html;

});

}



window.onload=function(){
if(window.location.hash){

let id=window.location.hash.replace("#","");

db.collection("links").doc(id).get()

.then((doc)=>{

if(doc.exists){

let data=doc.data();

db.collection("links").doc(id).update({
clicks:data.clicks+1
});

// Adsterra Ad Open
window.open("https://www.profitablecpmratenetwork.com/ncjbevd76?key=33af4988b6e3baf3f89e24526d911ad4","_blank");

// Original Link Redirect
setTimeout(()=>{
window.location=data.url;
},3000);

}

});

 }
loadLinks();

if(window.location.hash){

let id=window.location.hash.replace("#","");

db.collection("links").doc(id).get()

.then((doc)=>{

if(doc.exists){

let data=doc.data();

db.collection("links").doc(id).update({

clicks:data.clicks+1

});

window.location=data.url;
document.getElementById("redirectBtn").style.display="block";

document.getElementById("redirectBtn").onclick=function(){

  window.open("https://www.profitablecpmratenetwork.com/ncjbevd76?key=33af4988b6e3baf3f89e24526d911ad4","_blank");

  setTimeout(()=>{
    window.location = data.url;
  },3000);

 }
}

});

}

}

</script>

</body>
</html>
