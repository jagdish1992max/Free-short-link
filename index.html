<!DOCTYPE html>
<html>
<head>

<title>PRO URL Shortener</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.header{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
text-align:center;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#16a34a;
}

.stats{
display:flex;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.stat{
flex:1;
background:#334155;
padding:15px;
border-radius:10px;
text-align:center;
}

.card{
background:#334155;
padding:15px;
border-radius:10px;
margin-top:15px;
}

a{
color:#38bdf8;
word-break:break-all;
}

</style>

</head>

<body>

<div class="container">

<div class="header">🔗 PRO URL Shortener</div>

<div class="box">

<input id="url" placeholder="Paste long URL here">

<button onclick="generate()">Generate Link</button>

<div id="out"></div>

<div class="stats">

<div class="stat">
<div id="totalLinks">0</div>
Total Links
</div>

<div class="stat">
<div id="totalClicks">0</div>
Total Clicks
</div>

</div>

<h3 style="margin-top:20px">📊 Dashboard</h3>

<div id="history"></div>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAJxAwmhWbO_i3Yx_wumiOjg412paUgPxI",
authDomain: "free-short-2827c.firebaseapp.com",
projectId: "free-short-2827c",
storageBucket: "free-short-2827c.appspot.com",
messagingSenderId: "997627808794",
appId: "1:997627808794:web:794aaa06b8bc43ac6855a3"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function generate(){

let url=document.getElementById("url").value;

if(url==""){
alert("Enter URL first");
return;
}

db.collection("links").add({
url:url,
clicks:0,
created:Date.now()
})

.then((doc)=>{

let short=window.location.href.split("#")[0]+"#"+doc.id;

document.getElementById("out").innerHTML=

`<div class="card">
<a href="${short}" target="_blank">${short}</a>
<br><br>
<button onclick="copyLink('${short}')">Copy</button>
</div>`;

loadLinks();

});

}

function copyLink(link){

navigator.clipboard.writeText(link);

alert("Link copied");

}

function deleteLink(id){

if(confirm("Delete this link?")){

db.collection("links").doc(id).delete()

.then(()=>{

loadLinks();

});

}

}

function loadLinks(){

db.collection("links").orderBy("created","desc").get()

.then((snapshot)=>{

let html="";
let totalLinks=0;
let totalClicks=0;

snapshot.forEach((doc)=>{

let data=doc.data();
let id=doc.id;

let short=window.location.href.split("#")[0]+"#"+id;

totalLinks++;
totalClicks+=data.clicks;

html+=`

<div class="card">

🔗 <a href="${short}" target="_blank">${short}</a>

<br><br>

📊 Clicks: ${data.clicks}

<br><br>

<button onclick="copyLink('${short}')">Copy</button>

<button onclick="deleteLink('${id}')">Delete</button>

</div>

`;

});

document.getElementById("history").innerHTML=html;

document.getElementById("totalLinks").innerText=totalLinks;

document.getElementById("totalClicks").innerText=totalClicks;

});

}

window.onload=function(){

loadLinks();

if(window.location.hash){

let id=window.location.hash.replace("#","");

db.collection("links").doc(id).get()

.then((doc)=>{

if(doc.exists){

let data=doc.data();

db.collection("links").doc(id).update({
clicks:data.clicks+1
});

window.location=data.url;

}

});

}

}

</script>

</body>
</html>
